name: saas-platform

networks:
  platform:
    name: platform # exact name — matches Traefik's `providers.docker.network: platform`
    driver: bridge

volumes:
  keycloak-db-data:
  app-db-data:
  redis-data:

services:
  # ─── Traefik ───────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    networks:
      - platform
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.dashboard.rule=Host(`traefik.lvh.me`)'
      - 'traefik.http.routers.dashboard.tls=true'
      - 'traefik.http.routers.dashboard.entrypoints=websecure'
      - 'traefik.http.routers.dashboard.service=api@internal'
      - 'traefik.http.routers.dashboard.middlewares=dashboard-auth'
      - 'traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$apr1$$H6uskkkW$$IgXLP6ewTrSuBkTrqE8wj/'

  # ─── Test service (Phase 0 smoke-test, removed in Phase 2) ────────────────
  whoami:
    image: traefik/whoami:latest
    container_name: whoami
    networks:
      - platform
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.whoami.rule=PathPrefix(`/whoami`)'
      - 'traefik.http.routers.whoami.entrypoints=web'
      - 'traefik.http.services.whoami.loadbalancer.server.port=80'

  # ─── Keycloak DB ──────────────────────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    restart: unless-stopped
    networks:
      - platform
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_secret
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak -d keycloak']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Keycloak ─────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    networks:
      platform:
        aliases:
          - auth.lvh.me # lets other containers reach Keycloak by its public hostname (no TLS)
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secret
      KC_HOSTNAME: auth.lvh.me
      KC_HOSTNAME_STRICT: false
      KC_PROXY: edge
      KC_HTTP_ENABLED: true
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command:
      - start-dev
      - --import-realm
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.keycloak.rule=Host(`auth.lvh.me`)'
      - 'traefik.http.routers.keycloak.entrypoints=websecure'
      - 'traefik.http.routers.keycloak.tls=true'
      - 'traefik.http.services.keycloak.loadbalancer.server.port=8080'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── App DB ───────────────────────────────────────────────────────────────
  app-db:
    image: postgres:16-alpine
    container_name: app-db
    restart: unless-stopped
    networks:
      - platform
    environment:
      POSTGRES_DB: saas_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secret
    volumes:
      - app-db-data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d saas_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - platform
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Web (Next.js) ───────────────────────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      target: runner
    container_name: web
    restart: unless-stopped
    networks:
      - platform
    depends_on:
      app-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      # Override host-facing URLs with Docker-internal service hostnames
      DATABASE_URL: postgresql://postgres:postgres_secret@app-db:5432/saas_platform
      REDIS_URL: redis://redis:6379
      # KEYCLOAK_ISSUER must match the `issuer` in Keycloak's OIDC discovery doc.
      # Keycloak (KC_HOSTNAME=auth.lvh.me) reports http://auth.lvh.me/... when accessed via HTTP.
      # The `auth.lvh.me` alias on the platform network routes directly to Keycloak:8080 — no TLS.
      KEYCLOAK_ISSUER: http://auth.lvh.me/realms/saas-platform
      AUTH_URL: https://app.lvh.me
      NEXT_PUBLIC_APP_URL: https://app.lvh.me
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.web-app.rule=Host(`app.lvh.me`)'
      - 'traefik.http.routers.web-app.entrypoints=websecure'
      - 'traefik.http.routers.web-app.tls=true'
      - 'traefik.http.routers.web-app.priority=20'
      - "traefik.http.routers.web-wildcard.rule=HostRegexp(`^[a-z0-9-]+\\.lvh\\.me$`)"
      - 'traefik.http.routers.web-wildcard.entrypoints=websecure'
      - 'traefik.http.routers.web-wildcard.tls=true'
      - 'traefik.http.routers.web-wildcard.priority=10'
      - 'traefik.http.services.web.loadbalancer.server.port=3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/_health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Workers (BullMQ) ────────────────────────────────────────────────────
  workers:
    build:
      context: ../..
      dockerfile: infra/docker/workers.Dockerfile
    restart: unless-stopped
    networks:
      - platform
    depends_on:
      app-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      # Override host-facing URLs with Docker-internal service hostnames
      DATABASE_URL: postgresql://postgres:postgres_secret@app-db:5432/saas_platform
      REDIS_URL: redis://redis:6379
      KEYCLOAK_ISSUER: http://auth.lvh.me/realms/saas-platform

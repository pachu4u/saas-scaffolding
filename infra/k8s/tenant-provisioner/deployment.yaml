apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-workers
  namespace: saas-platform
  labels:
    app.kubernetes.io/name: saas-workers
    app.kubernetes.io/part-of: saas-platform
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: saas-workers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: saas-workers
    spec:
      serviceAccountName: saas-workers
      # k3s and the docker-compose Traefik share this single host (see
      # docs/infra/tenant-provisioner.md) — this hostPath is the compose
      # Traefik's file-provider directory, so writes here are picked up by
      # Traefik directly. TRAEFIK_DYNAMIC_DIR (secret.env) must match
      # mountPath below.
      volumes:
        - name: traefik-dynamic
          hostPath:
            path: /root/.openclaw/workspace/saas-scaffolding/infra/compose/traefik/dynamic
            type: Directory
      containers:
        - name: workers
          image: saas-platform-workers:k8s-deploy
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: saas-workers-env
          volumeMounts:
            - name: traefik-dynamic
              mountPath: /etc/traefik-dynamic
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 1Gi

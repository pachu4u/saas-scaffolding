http:
  routers:
    keycloak:
      rule: 'Host(`auth.lvh.me`)'
      entryPoints:
        - websecure
      tls: {}
      service: keycloak
      priority: 100

    keycloak-saas:
      rule: 'Host(`auth.techhanker.com`)'
      entryPoints:
        - websecure
      tls: {}
      service: keycloak
      priority: 100

  services:
    keycloak:
      loadBalancer:
        servers:
          - url: 'http://keycloak:8080'

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.6.0
  NODE_VERSION: 20

jobs:
  # ─── Lint & Typecheck ───────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm format:check

  # ─── Unit Tests ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: test-secret-32-chars-minimum-here
          AUTH_URL: http://localhost:3000
          KEYCLOAK_ISSUER: http://localhost:8080/realms/saas-platform
          KEYCLOAK_CLIENT_ID: web
          KEYCLOAK_CLIENT_SECRET: test-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          PLATFORM_INTERNAL_SECRET: test-internal-secret-min16chars

  # ─── Build Images ───────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/saas-platform-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: GIT_SHA=${{ github.sha }}

      - name: Build workers image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/workers.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/saas-platform-workers:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: GIT_SHA=${{ github.sha }}

  # ─── Security Scans ─────────────────────────────────────────────────────
  security:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  # ─── E2E Tests ──────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @platform/web exec playwright install --with-deps chromium

      - name: Start Compose stack
        run: |
          cp .env.example .env
          docker compose -f infra/compose/docker-compose.yml up -d
          sleep 30
        env:
          AUTH_SECRET: e2e-test-secret-32-chars-minimum-here
          PLATFORM_INTERNAL_SECRET: e2e-internal-secret-min16

      - name: Run E2E tests
        run: pnpm --filter @platform/web exec playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

  # ─── SCIM Conformance ───────────────────────────────────────────────────
  scim-conformance:
    name: SCIM Conformance
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @platform/scim test

  # ─── Helm Chart Test ────────────────────────────────────────────────────
  chart-test:
    name: Helm Chart Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Lint Helm chart
        run: helm lint infra/helm/saas-platform

      - name: Template check (dev)
        run: helm template saas-platform infra/helm/saas-platform -f infra/helm/saas-platform/values-dev.yaml > /dev/null

      - name: Template check (prod)
        run: helm template saas-platform infra/helm/saas-platform -f infra/helm/saas-platform/values-prod.yaml > /dev/null

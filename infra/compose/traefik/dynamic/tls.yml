# cert-reload: 1
tls:
  certificates:
    - certFile: /etc/traefik/certs/_wildcard.lvh.me.pem
      keyFile: /etc/traefik/certs/_wildcard.lvh.me-key.pem
    - certFile: /etc/traefik/certs/techhanker.com.pem
      keyFile: /etc/traefik/certs/techhanker.com-key.pem
    - certFile: /etc/traefik/certs/riogentix-tenants.techhanker.com.pem
      keyFile: /etc/traefik/certs/riogentix-tenants.techhanker.com-key.pem

  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/_wildcard.lvh.me.pem
        keyFile: /etc/traefik/certs/_wildcard.lvh.me-key.pem

  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305

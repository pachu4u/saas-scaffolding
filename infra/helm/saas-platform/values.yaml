# Default values — override per environment via values-{env}.yaml

global:
  imageRegistry: ""
  imagePullSecrets: []

# ─── Web ─────────────────────────────────────────────────────────────────────
web:
  image:
    repository: ghcr.io/your-org/saas-platform-web
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: web

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  livenessProbe:
    httpGet:
      path: /_health
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /_ready
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 5

# ─── Workers ─────────────────────────────────────────────────────────────────
workers:
  image:
    repository: ghcr.io/your-org/saas-platform-workers
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8

  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1

# ─── Bitnami sub-charts ──────────────────────────────────────────────────────
appdb:
  enabled: true
  auth:
    database: saas_platform
    username: postgres
    existingSecret: app-db-secret

redis:
  enabled: true
  auth:
    existingSecret: redis-secret

keycloak:
  enabled: true
  auth:
    adminUser: admin
    existingSecret: keycloak-secret

traefik:
  enabled: true
  ingressClass:
    enabled: true
    isDefaultClass: true

cert-manager:
  enabled: true
  installCRDs: true

external-secrets:
  enabled: false

# ─── Platform config ─────────────────────────────────────────────────────────
platform:
  domain: "example.com"
  secretsBackend: "kubernetes"  # "vault" | "aws" | "kubernetes"

name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  PNPM_VERSION: 9.6.0
  NODE_VERSION: 20

jobs:
  # ─── Build & Push Images ────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # for SLSA provenance

    outputs:
      web-image: ${{ steps.web-meta.outputs.tags }}
      workers-image: ${{ steps.workers-meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract web metadata
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/saas-platform-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Extract workers metadata
        id: workers-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/saas-platform-workers
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
          build-args: GIT_SHA=${{ github.sha }}

      - name: Build & push workers image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/workers.Dockerfile
          push: true
          tags: ${{ steps.workers-meta.outputs.tags }}
          labels: ${{ steps.workers-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
          build-args: GIT_SHA=${{ github.sha }}

  # ─── Push Helm Chart ────────────────────────────────────────────────────
  push-helm-chart:
    name: Push Helm Chart to OCI
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Log in to GHCR (OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package & push chart
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          helm package infra/helm/saas-platform --version "$VERSION" --app-version "$VERSION"
          helm push "saas-platform-${VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts

  # ─── Deploy to Staging ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, push-helm-chart]
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Set up kubeconfig
        run: echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > /tmp/kubeconfig

      - name: Helm upgrade (staging)
        env:
          KUBECONFIG: /tmp/kubeconfig
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          helm upgrade --install saas-platform \
            oci://ghcr.io/${{ github.repository_owner }}/charts/saas-platform \
            --version "${GITHUB_REF#refs/tags/v}" \
            -f infra/helm/saas-platform/values-dev.yaml \
            --set web.image.tag="$IMAGE_TAG" \
            --set workers.image.tag="$IMAGE_TAG" \
            --wait \
            --timeout 10m

      - name: Smoke test staging
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: kubectl wait --for=condition=available deploy/web --timeout=300s

  # ─── Deploy to Production (manual gate) ────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production  # requires manual approval in GitHub UI

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Set up kubeconfig
        run: echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > /tmp/kubeconfig

      - name: Helm upgrade (production)
        env:
          KUBECONFIG: /tmp/kubeconfig
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          helm upgrade --install saas-platform \
            oci://ghcr.io/${{ github.repository_owner }}/charts/saas-platform \
            --version "${GITHUB_REF#refs/tags/v}" \
            -f infra/helm/saas-platform/values-prod.yaml \
            --set web.image.tag="$IMAGE_TAG" \
            --set workers.image.tag="$IMAGE_TAG" \
            --wait \
            --timeout 15m

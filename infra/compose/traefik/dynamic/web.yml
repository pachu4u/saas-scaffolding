http:
  routers:
    web-app:
      rule: 'Host(`app.lvh.me`)'
      service: web-service
      entryPoints:
        - websecure
      tls: {}

    web-wildcard:
      rule: "HostRegexp(`^[a-z0-9-]+\\.lvh\\.me$`)"
      service: web-service
      entryPoints:
        - websecure
      tls: {}

    web-saas:
      rule: 'Host(`saas.techhanker.com`)'
      service: web-service
      entryPoints:
        - websecure
      tls: {}
      priority: 20

    # {slug}.techhanker.com now routes to the per-tenant k8s instances — see
    # riogentix-tenants.yml. The Next.js app no longer claims tenant
    # subdomains, and the legacy shared riogentix container is stopped.

  services:
    web-service:
      loadBalancer:
        servers:
          - url: 'http://web:3000'

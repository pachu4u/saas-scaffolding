apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`app.{{ .Values.platform.domain }}`)"
      kind: Rule
      priority: 20
      services:
        - name: web
          port: 3000
    - match: "HostRegexp(`^[a-z0-9-]+\\.{{ .Values.platform.domain }}$`)"
      kind: Rule
      priority: 10
      services:
        - name: web
          port: 3000
  tls:
    certResolver: letsencrypt
    domains:
      - main: "*.{{ .Values.platform.domain }}"
        sans:
          - "{{ .Values.platform.domain }}"

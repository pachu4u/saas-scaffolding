# Manual stopgap for glass/globex (2026-07-23 incident), mirroring the old
# acme-only pattern: Traefik's ACME "certificate from router rule" default
# generation only extracts literal Host() domains at config-load time — it
# cannot enumerate a HostRegexp (see tenant-app-admin-subdomains.yml), so
# that generic router never actually requests a cert for any new tenant.
# acme.techhanker.com only worked because its cert was issued years ago via
# a since-deleted per-tenant Host()-based router and is still cached in
# acme.json. This file is the same one-off manual step repeated for
# glass/globex — it is NOT a real fix for future tenants (see follow-up:
# provisioning needs to render one of these per tenant automatically).
http:
  routers:
    app-glass-tenant:
      rule: 'Host(`app.glass.techhanker.com`)'
      service: k8s-ingress
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      priority: 15

    admin-glass-tenant:
      rule: 'Host(`admin.glass.techhanker.com`)'
      service: web-service
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      priority: 15

    app-globex-tenant:
      rule: 'Host(`app.globex.techhanker.com`)'
      service: k8s-ingress
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      priority: 15

    admin-globex-tenant:
      rule: 'Host(`admin.globex.techhanker.com`)'
      service: web-service
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      priority: 15

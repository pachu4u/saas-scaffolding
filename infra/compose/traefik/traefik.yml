global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        X-Request-Id: keep

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ':443'
    http:
      tls: {}

providers:
  # Use file provider instead of Docker provider to avoid API version mismatch
  # Docker provider error: "client version 1.24 is too old. Minimum supported API version is 1.44"
  # We'll use static configuration in dynamic/ directory for now
  file:
    directory: /etc/traefik/dynamic
    watch: true

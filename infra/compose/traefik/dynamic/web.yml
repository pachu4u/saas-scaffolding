http:
  routers:
    web-app:
      rule: 'Host(`app.lvh.me`)'
      service: web-service
      entryPoints:
        - websecure
      tls: {}

    web-wildcard:
      rule: "HostRegexp(`^[a-z0-9-]+\\.lvh\\.me$`)"
      service: web-service
      entryPoints:
        - websecure
      tls: {}

    web-saas:
      rule: 'Host(`saas.techhanker.com`)'
      service: web-service
      entryPoints:
        - websecure
      tls: {}
      priority: 20

    # Riogentix AI builder — served at riogentix.techhanker.com
    # Higher priority than the wildcard below so it routes to the right container.
    riogentix:
      rule: 'Host(`riogentix.techhanker.com`)'
      service: riogentix-service
      entryPoints:
        - websecure
      tls: {}
      priority: 50

    # Wildcard routing for tenant subdomains: {slug}.techhanker.com → Next.js app
    # DNS: *.techhanker.com must point to this server (wildcard A record).
    web-tenant-wildcard:
      rule: "HostRegexp(`^[a-z0-9-]+\\.techhanker\\.com$`)"
      service: web-service
      entryPoints:
        - websecure
      tls: {}
      priority: 5

  services:
    web-service:
      loadBalancer:
        servers:
          - url: 'http://web:3000'

    riogentix-service:
      loadBalancer:
        servers:
          - url: 'http://riogentix:7860'

# Dev override: expose services on non-conflicting host ports.
# app-db → localhost:5434, keycloak → localhost:8081
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev-override.yml up -d

services:
  keycloak:
    ports:
      - '8081:8080'
    environment:
      KC_HOSTNAME: ''
      KC_HOSTNAME_URL: ''
      KC_HOSTNAME_ADMIN_URL: ''
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
    labels:
      - 'traefik.enable=false'

  redis:
    ports:
      - '6379:6379'

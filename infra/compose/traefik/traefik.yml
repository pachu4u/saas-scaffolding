global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        X-Request-Id: keep

api:
  dashboard: true
  insecure: false

# DNS-01 resolver for hosts that aren't covered by Cloudflare's free
# Universal SSL (which only covers the apex + one level of wildcard, i.e.
# *.techhanker.com — not two-level hosts like app.acme.techhanker.com).
# Those hosts are DNS-only (grey-cloud) in Cloudflare, so Traefik itself
# must present a publicly-trusted cert. CF_DNS_API_TOKEN comes from ../../.env.
certificatesResolvers:
  cloudflare:
    acme:
      email: platform@techhanker.com
      storage: /etc/traefik/acme/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - '1.1.1.1:53'
          - '8.8.8.8:53'

entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ':443'
    http:
      tls: {}

providers:
  # Use file provider instead of Docker provider to avoid API version mismatch
  # Docker provider error: "client version 1.24 is too old. Minimum supported API version is 1.44"
  # We'll use static configuration in dynamic/ directory for now
  file:
    directory: /etc/traefik/dynamic
    watch: true

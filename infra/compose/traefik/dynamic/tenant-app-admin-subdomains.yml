# Second-level tenant subdomains for every tenant, e.g. app.acme.techhanker.com
# and admin.demo.techhanker.com. Cloudflare's free Universal SSL only covers
# the apex + one level of wildcard, so *.{slug}.techhanker.com is DNS-only
# (grey-cloud) in Cloudflare and needs a real cert from Traefik's own ACME
# DNS-01 resolver (see certificatesResolvers.cloudflare in traefik.yml).
# certResolver with no explicit `domains` makes Traefik request a cert for
# whatever host shows up in the TLS ClientHello SNI, so this works per-tenant
# without listing every slug — a new tenant's first request gets its own
# cert with no manual Traefik change. DNS itself is already wildcarded at
# the zone, so no per-tenant DNS record is needed either — only new tenant
# provisioning (which already renders the k8s Ingress host rule below) is
# required for app./admin. to start working for that slug.
#
# app.{slug}.techhanker.com forwards straight to the same k8s-ingress
# NodePort used by the {slug}.techhanker.com/app routers
# (riogentix-tenants.yml), but unprefixed — Riogentix already serves
# unprefixed at "/". Each tenant's k8s Ingress
# (apps/workers/src/provisioning/manifests.ts, renderIngress) has a matching
# host rule so ingress-nginx routes app.{slug}.techhanker.com to that
# tenant's Riogentix pod.
#
# admin.{slug}.techhanker.com forwards to the SaaS `web` container itself
# (web-service, defined in web.yml) — not to Riogentix/k8s. The web app's
# middleware (apps/web/src/middleware.ts, extractSlug) recognizes the
# `admin.{slug}` host shape and rewrites the request straight into that
# tenant's /t/{slug}/admin tree, so this host is equivalent to
# {slug}.techhanker.com/admin but on its own subdomain.
http:
  routers:
    app-tenant-subdomain:
      rule: "HostRegexp(`^app\\.[a-z0-9-]+\\.techhanker\\.com$`)"
      service: k8s-ingress
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      priority: 10

    admin-tenant-subdomain:
      rule: "HostRegexp(`^admin\\.[a-z0-9-]+\\.techhanker\\.com$`)"
      service: web-service
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      priority: 10
